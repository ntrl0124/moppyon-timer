<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; media-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>休憩時間です</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <main class="overlay-shell">
      <section class="overlay-card">
        <p id="stateBadge" class="eyebrow">BREAK TIME</p>
        <h1 id="message">文鳥が呼んでいます。</h1>
        <p id="supportingText" class="supporting-text">
          席を離れて、目と肩をほぐしましょう。
        </p>

        <div class="status-panel" role="status" aria-live="polite">
          <p id="remainingLabel" class="status-panel__primary">休憩時間 — あと 00:00</p>
          <p id="closeLabel" class="status-panel__secondary">閉じるまで 00秒</p>
        </div>

        <div class="media-frame">
          <video id="bunchoVideo" autoplay playsinline loop></video>
          <div id="fallbackMessage" class="fallback-message" hidden>
            <p>文鳥動画が見つかりませんでした。</p>
            <p>`assets/videos` に動画を置くとランダム再生されます。</p>
          </div>
        </div>

        <button id="closeButton" class="close-button" type="button" disabled>
          まだ閉じられません
        </button>
      </section>
    </main>

    <script src="./overlay.js"></script>
  </body>
</html>
